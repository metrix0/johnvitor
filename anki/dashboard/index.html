<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anki – Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../app.css">
</head>
<body data-page="notes">
<div class="wrap">

    <div class="topbar">
        <div class="left">
            <strong style="font-size:16px">Notes</strong>
            <span class="badge" id="statusBadge">Not connected</span>
            <span class="pill" id="saveState">Idle</span>
        </div>
        <div class="right">
            <a class="btn-ghost nav-link" href="../index.html">
                <i class="fa-solid fa-layer-group"></i> Deck Editor
            </a>

            <a class="btn-ghost nav-link" href="../notes/index.html">
                <i class="fa-solid fa-table-columns"></i> Dashboard
            </a>

            <button class="btn-ghost" id="refreshBtn"><i class="fa-solid fa-rotate"></i> Refresh</button>
        </div>
    </div>

    <div class="layout">
        <div class="panel">
            <h2>Categories</h2>
            <div class="catTop">
                <input id="newCatName" placeholder="New category…" />
                <button class="btn-primary" id="addCatBtn"><i class="fa-solid fa-plus"></i> Add</button>
            </div>
            <div class="catList" id="catList"></div>
        </div>

        <div class="panel">
            <h2>Notes</h2>
            <div class="editorWrap">
                <div class="editorHeader">
                    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                        <input class="titleInput" id="catTitle" placeholder="Category title…" />
                        <span class="muted" id="updatedLabel">—</span>
                    </div>

                    <div style="display:flex;gap:10px;flex-wrap:wrap">
                        <button class="btn-ok" id="saveBtn"><i class="fa-solid fa-floppy-disk"></i> Save</button>
                    </div>
                </div>

                <textarea class="editor" id="notesEditor" placeholder="Write anything here…"></textarea>
                <div class="muted" style="margin-top:8px;font-size:13px">
                    Auto-save after you stop typing for ~800ms.
                </div>
            </div>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script src="../app.js"></script>
</body>
</html>
