<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anki – Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./app.css">
</head>
<body data-page="editor">
<div class="wrap editor-wrap">
    <div class="topbar">
        <div class="left">
            <strong style="font-size:16px">Anki Editor</strong>
            <span class="badge" id="statusBadge">Not connected</span>
        </div>

        <div class="right">
            <select id="deckSelect" title="Select deck"></select>

            <input id="newDeckName" placeholder="New deck name…" />
            <button class="btn-primary" id="createDeckBtn"><i class="fa-solid fa-plus"></i> Create</button>

            <a class="btn-ghost nav-link" href="./dashboard/index.html">
                <i class="fa-solid fa-layer-group"></i> Notes
            </a>

            <a class="btn-ghost nav-link" href="./notes/index.html">
                <i class="fa-solid fa-table-columns"></i> Dashboard
            </a>
        </div>
    </div>

    <div class="grid" id="grid">
        <div class="head">
            <div>Front</div>
            <div>Back</div>
            <div></div>
        </div>
        <div id="rows"></div>
    </div>

    <div class="footer">
        <div class="hint">
            <div><strong>Keys:</strong></div>
            <div>• <b>Tab</b> → next field (Front → Back → next row Front)</div>
            <div>• <b>Enter</b> → create new row</div>
            <div>• <b>Shift + Enter</b> → newline inside card</div>
            <div>• <b>Ctrl + S</b> → save</div>
            <div>• <b>Click trash</b> or <b>Ctrl + Shift + Backspace</b> → delete row</div>
        </div>

        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <button class="btn-danger" id="clearBtn"><i class="fa-solid fa-broom"></i> Clear empty rows</button>
            <button class="btn-ok" id="saveBtn"><i class="fa-solid fa-floppy-disk"></i> Save it</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="./app.js"></script>
</body>
</html>
